name: Build site

on:
  push:
    branches: [main]
    paths:
      - "_src/**"
      - "_partials/**"
      - "build.py"
      - "build_galleries.py"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run build
        run: python build.py

      - name: Commit regenerated HTML
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "*.html" "galleries/*.html"
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "build: regenerate HTML [skip ci]"
            git push
          fi
